<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC Component Library</title>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; } body { overflow: hidden; }</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useRef, useEffect, createContext, useContext } = React;

/* ═══ CONFIGURE: GitHub repo to load components from ═══ */
const REPO_OWNER = "valeriamicolta-huge";
const REPO_NAME = "abc-component-workspace";
const BRANCH = "main";
const COMPONENTS_PATH = "components";
const REGISTRY_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${COMPONENTS_PATH}/registry.json`;
const COMPONENT_BASE_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${COMPONENTS_PATH}/`;

/* ═══ M3 Tokens ═══ */
const THEMES = {
  light: { pri: "#0b57d0", onPri: "#fff", priC: "#d3e3fd", onPriC: "#0842a0", tert: "#146c2e", err: "#b3261e", errC: "#f9dedc", surf: "#fff", surfCL: "#f8fafd", surfC: "#f0f4f9", surfCH: "#e9eef6", surfCHi: "#dde3ea", onSurf: "#1f1f1f", onSurfV: "#444746", outl: "#747775", outlV: "#c4c7c5" },
  dark: { pri: "#a8c7fa", onPri: "#062e6f", priC: "#0842a0", onPriC: "#d3e3fd", tert: "#6dd58c", err: "#f2b8b5", errC: "#8c1d18", surf: "#131314", surfCL: "#1b1b1b", surfC: "#1e1f20", surfCH: "#282a2c", surfCHi: "#333537", onSurf: "#e3e3e3", onSurfV: "#c4c7c5", outl: "#8e918f", outlV: "#444746" },
};
const S = { shXs: 4, shSm: 8, shMd: 12, shFull: 9999, el1: "0 1px 2px 0 rgba(0,0,0,0.3),0 1px 3px 1px rgba(0,0,0,0.15)", el2: "0 1px 2px 0 rgba(0,0,0,0.3),0 2px 6px 2px rgba(0,0,0,0.15)", ease: "cubic-bezier(0.2,0,0,1)", dur: "200ms", f: '"Google Sans Text","Roboto","Noto Sans",system-ui,sans-serif' };
const ThemeCtx = createContext(THEMES.light);
const useT = () => useContext(ThemeCtx);

/* ═══ Helpers exposed to renderers ═══ */
function getDominantColor(src, cb) { const img = new Image(); img.crossOrigin = "anonymous"; img.onload = () => { const c = document.createElement("canvas"), x = c.getContext("2d"); c.width = c.height = 50; x.drawImage(img, 0, 0, 50, 50); const d = x.getImageData(0, 0, 50, 50).data; let r = 0, g = 0, b = 0, n = 0; for (let i = 0; i < d.length; i += 16) { r += d[i]; g += d[i+1]; b += d[i+2]; n++; } cb("#" + [r, g, b].map(v => Math.round(v/n).toString(16).padStart(2, "0")).join("")); }; img.src = src; }
function lum(h) { const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16); return (0.299*r+0.587*g+0.114*b)/255; }

/* ═══ Renderer sandbox — globals available inside renderer.jsx files ═══ */
const RENDERER_GLOBALS = { React, useState, useRef, useEffect, useContext, THEMES, S, ThemeCtx, useT, lum };

/* ═══ Compile a renderer.jsx text string into a React component ═══ */
function compileRenderer(jsxText, componentId) {
  try {
    /* Transform JSX → JS using Babel (already loaded on the page) */
    const transformed = Babel.transform(jsxText, { presets: ["react"] }).code;
    /* Wrap in a function that takes globals and returns the renderer.
       The renderer.jsx file should end with: return Renderer; */
    const factory = new Function(...Object.keys(RENDERER_GLOBALS), transformed + "\n; return typeof Renderer !== 'undefined' ? Renderer : null;");
    return factory(...Object.values(RENDERER_GLOBALS));
  } catch (e) {
    console.error("Failed to compile renderer for " + componentId + ":", e);
    return null;
  }
}

/* ═══ M3 Controls ═══ */
function M3Select({ label, value, options, onChange }) {
  const T = useT(); const [open, setOpen] = useState(false); const ref = useRef(null);
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  return (<div ref={ref} style={{ position: "relative" }}>
    {label && <label style={{ display: "block", fontSize: 11, fontWeight: 500, color: T.onSurfV, marginBottom: 4, letterSpacing: "0.5px" }}>{label}</label>}
    <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", height: 44, padding: "0 12px 0 14px", borderRadius: S.shXs, border: `1px solid ${open ? T.pri : T.outl}`, background: T.surf, color: T.onSurf, fontFamily: S.f, fontSize: 14, cursor: "pointer", textAlign: "left" }}>
      <span>{value}</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ transform: open ? "rotate(180deg)" : "rotate(0)", transition: `transform ${S.dur} ${S.ease}` }}><path d="M6 9L12 15L18 9" stroke={T.onSurfV} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
    {open && (<div style={{ position: "absolute", top: "100%", left: 0, right: 0, marginTop: 4, background: T.surf, borderRadius: S.shXs, boxShadow: S.el2, border: `1px solid ${T.outlV}`, zIndex: 30, overflow: "hidden" }}>
      {options.map(o => (<button key={o} onClick={() => { onChange(o); setOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 14px", border: "none", background: value === o ? T.priC : "transparent", color: value === o ? T.onPriC : T.onSurf, fontFamily: S.f, fontSize: 13, cursor: "pointer", textAlign: "left" }} onMouseOver={e => { if (value !== o) e.currentTarget.style.background = T.surfCH; }} onMouseOut={e => { if (value !== o) e.currentTarget.style.background = "transparent"; }}>
        {value === o && <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L20 7" stroke={T.onPriC} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}{o}
      </button>))}
    </div>)}
  </div>);
}

function M3Seg({ label, options, value, onChange }) {
  const T = useT();
  return (<div>
    {label && <label style={{ display: "block", fontSize: 11, fontWeight: 500, color: T.onSurfV, marginBottom: 4, letterSpacing: "0.5px" }}>{label}</label>}
    <div style={{ display: "flex", borderRadius: S.shFull, border: `1px solid ${T.outl}`, overflow: "hidden" }}>
      {options.map((o, i) => (<button key={o} onClick={() => onChange(o)} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, flex: 1, height: 40, border: "none", borderLeft: i > 0 ? `1px solid ${T.outl}` : "none", background: value === o ? T.priC : "transparent", color: value === o ? T.onPriC : T.onSurf, fontFamily: S.f, fontSize: 13, fontWeight: 500, cursor: "pointer", transition: `all ${S.dur} ${S.ease}` }}>
        {value === o && <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L20 7" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" /></svg>}{o}
      </button>))}
    </div>
  </div>);
}

function M3Switch({ label, checked, onChange }) {
  const T = useT();
  return (<div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
    <span style={{ fontSize: 13, color: T.onSurf }}>{label}</span>
    <div onClick={onChange} style={{ width: 48, height: 28, borderRadius: 14, padding: 2, background: checked ? T.pri : T.outlV, cursor: "pointer", transition: `background ${S.dur} ${S.ease}` }}>
      <div style={{ width: 24, height: 24, borderRadius: 12, background: checked ? T.onPri : T.surf, boxShadow: S.el1, transform: checked ? "translateX(20px)" : "translateX(0)", transition: `transform ${S.dur} ${S.ease}` }} />
    </div>
  </div>);
}

function Section({ title, open, onToggle, children }) {
  const T = useT();
  return (<div style={{ borderBottom: `1px solid ${T.outlV}` }}>
    <button onClick={onToggle} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", padding: "12px 20px", border: "none", background: "transparent", cursor: "pointer", fontFamily: S.f }}>
      <span style={{ fontSize: 13, fontWeight: 500, color: T.onSurf, letterSpacing: "0.1px" }}>{title}</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ transform: open ? "rotate(180deg)" : "rotate(0)", transition: `transform ${S.dur} ${S.ease}` }}><path d="M6 9L12 15L18 9" stroke={T.onSurfV} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
    {open && <div style={{ padding: "0 20px 16px", display: "flex", flexDirection: "column", gap: 14 }}>{children}</div>}
  </div>);
}

/* ═══ Generic placeholder for components without a renderer ═══ */
function GenericComponentPreview({ component, error }) {
  const T = useT();
  return (<div style={{ width: 330, padding: 32, borderRadius: 20, background: T.surfCH, color: T.onSurfV, fontFamily: S.f, textAlign: "center", border: `2px dashed ${T.outlV}` }}>
    <h3 style={{ fontSize: 14, fontWeight: 500, color: T.onSurf, margin: "0 0 8px" }}>{component.name}</h3>
    <p style={{ fontSize: 12, lineHeight: "18px", margin: 0 }}>{error || "This component's preview renderer is not yet built. The data and export still work — only the visual preview is missing."}</p>
  </div>);
}

function App() {
  const [dark, setDark] = useState(false);
  const T = dark ? THEMES.dark : THEMES.light;
  const [components, setComponents] = useState([]);
  const [selComp, setSelComp] = useState(null);
  const [renderer, setRenderer] = useState(null);
  const [rendererError, setRendererError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [search, setSearch] = useState("");
  const [vars, setVars] = useState({});
  const [exportOpen, setExportOpen] = useState(false);
  const [mediaImg, setMediaImg] = useState(null);
  const [dominantColor, setDominantColor] = useState("#e0e0e0");
  const [title, setTitle] = useState("");
  const [brand, setBrand] = useState("");
  const [sections, setSections] = useState({ variants: true, content: true, tokens: false, typo: false });
  const imgRef = useRef(null);

  /* Load components from GitHub on mount.
     Each component is now a folder: components/<id>/data.json + components/<id>/renderer.jsx */
  useEffect(() => {
    async function loadComponents() {
      try {
        const regRes = await fetch(REGISTRY_URL + "?t=" + Date.now());
        if (!regRes.ok) throw new Error("Registry not found");
        const reg = await regRes.json();
        const loaded = await Promise.all(reg.components.map(async c => {
          const dataUrl = COMPONENT_BASE_URL + c.id + "/data.json?t=" + Date.now();
          const r = await fetch(dataUrl);
          const data = await r.json();
          return data;
        }));
        setComponents(loaded);
        if (loaded.length > 0) setSelComp(loaded[0]);
        setLoading(false);
      } catch (e) {
        setLoadError(e.message);
        setLoading(false);
      }
    }
    loadComponents();
  }, []);

  /* Load and compile the renderer when the selected component changes */
  useEffect(() => {
    if (!selComp) { setRenderer(null); return; }
    setRenderer(null);
    setRendererError(null);
    if (selComp.hasRenderer === false) return;
    async function loadRenderer() {
      try {
        const rendererUrl = COMPONENT_BASE_URL + selComp.id + "/renderer.jsx?t=" + Date.now();
        const r = await fetch(rendererUrl);
        if (!r.ok) { setRendererError("No renderer.jsx found in components/" + selComp.id + "/"); return; }
        const jsxText = await r.text();
        const compiled = compileRenderer(jsxText, selComp.id);
        if (compiled) { setRenderer(() => compiled); }
        else { setRendererError("Renderer code failed to compile. See browser console for details."); }
      } catch (e) {
        setRendererError("Failed to load renderer: " + e.message);
      }
    }
    loadRenderer();
  }, [selComp]);

  useEffect(() => {
    if (!selComp) return;
    const d = {};
    Object.entries(selComp.properties).forEach(([k, v]) => { d[k] = v.default; });
    setVars(d);
    setMediaImg(null); setDominantColor("#e0e0e0"); setTitle(""); setBrand("");
  }, [selComp]);

  const setVar = (k, v) => setVars(p => ({ ...p, [k]: v }));
  const togSec = k => setSections(p => ({ ...p, [k]: !p[k] }));
  const handleImg = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { const s = ev.target.result; setMediaImg(s); getDominantColor(s, h => setDominantColor(h)); }; r.readAsDataURL(f); };
  const filtered = components.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));

  const exportMd = () => {
    if (!selComp) return "";
    const c = selComp, p = c.tokens.padding;
    let m = "# " + c.name + "\n\n" + c.description + "\n\n";
    m += "## Visual Design\n\n![Visual Reference](screenshot.png)\n\n";
    m += "### Typography\n\n| Element | Token | Spec |\n|---|---|---|\n";
    Object.entries(c.tokens.typography).forEach(([k, v]) => { m += "| " + k.charAt(0).toUpperCase() + k.slice(1) + " | " + v.token + " | " + v.spec + " |\n"; });
    m += "\n### Colors (Light Mode)\n\n| Element | Token | Hex |\n|---|---|---|\n";
    c.colors.light.forEach(r => { m += "| " + r[0] + " | " + r[1] + " | `" + r[2] + "` |\n"; });
    m += "\n### Colors (Dark Mode)\n\n| Element | Token | Hex |\n|---|---|---|\n";
    c.colors.dark.forEach(r => { m += "| " + r[0] + " | " + r[1] + " | `" + r[2] + "` |\n"; });
    m += "\n### Layout & Spacing\n\n| Property | Value |\n|---|---|\n";
    m += "| Corner radius | " + c.tokens.cornerRadius + " |\n| Width | " + c.tokens.width + " |\n| Media height | " + c.tokens.mediaHeight + " |\n| Padding | " + p.top + "dp " + p.right + "dp " + p.bottom + "dp " + p.left + "dp |\n";
    m += "\n### Assets\n\n| Asset | Type | Usage |\n|---|---|---|\n";
    c.assets.forEach(a => { m += "| " + a[0] + " | " + a[1] + " | " + a[2] + " |\n"; });
    m += "\n## Properties & Variants\n\n| Property | Type | Default | Options |\n|---|---|---|---|\n";
    Object.entries(c.properties).forEach(([k, v]) => { m += "| " + k + " | " + v.type + " | " + v.default + " | " + (v.options ? v.options.join(", ") : "true / false") + " |\n"; });
    m += "\n### Variants\n\n";
    c.variants.forEach(v => { m += "#### " + v.name + "\n\n" + v.desc + "\n\n"; });
    m += "## Behavior & States\n\n" + c.behavior.interactive + "\n\n" + c.behavior.dynamic + "\n\n**Read Receipt:** " + c.behavior.readReceipt + "\n\n| State | Description |\n|---|---|\n";
    c.states.forEach(s => { m += "| " + s[0] + " | " + s[1] + " |\n"; });
    m += "\n## Dark Mode\n\n| Token | Light | Dark |\n|---|---|---|\n";
    c.darkMode.tokens.forEach(t => { m += "| " + t[0] + " | `" + t[1] + "` | `" + t[2] + "` |\n"; });
    m += "\n" + c.darkMode.notes + "\n\n## Motion\n\n| Transition | Duration | Easing |\n|---|---|---|\n";
    c.motion.forEach(t => { m += "| " + t[0] + " | " + t[1] + " | `" + t[2] + "` |\n"; });
    m += "\n## Writing\n\n| Element | Guidelines |\n|---|---|\n";
    c.writing.forEach(w => { m += "| " + w[0] + " | " + w[1] + " |\n"; });
    m += "\n## Accessibility\n\n| Aspect | Implementation |\n|---|---|\n";
    c.a11y.forEach(a => { m += "| " + a[0] + " | " + a[1] + " |\n"; });
    m += "\n## Metadata\n\n- **Figma Source**: [" + c.name + "](https://www.figma.com/design/" + c.figmaFileKey + "/?node-id=" + c.figmaNodeId.replace(":", "-") + ")\n- **Node**: `" + c.figmaNodeId + "`\n- **Platform**: Android (Material Design 3)\n";
    return m;
  };

  const doExport = (fmt) => {
    if (!selComp) return;
    const content = fmt === "md" ? exportMd() : JSON.stringify(selComp, null, 2);
    try {
      const bl = new Blob([content], { type: fmt === "md" ? "text/markdown" : "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(bl);
      a.download = selComp.id + "." + fmt;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } catch(e) {}
    setExportOpen(false);
  };

  if (loading) {
    return (<div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: T.surfC, color: T.onSurfV, fontFamily: S.f, fontSize: 14 }}>Loading components from GitHub…</div>);
  }
  if (loadError) {
    return (<div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: T.surfC, color: T.err, fontFamily: S.f, fontSize: 14, padding: 24, textAlign: "center" }}>
      <p>Failed to load components: {loadError}</p>
      <p style={{ marginTop: 8, color: T.onSurfV, fontSize: 12 }}>Check that the repo and registry.json exist at the configured URL.</p>
    </div>);
  }

  return (
    <ThemeCtx.Provider value={T}>
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", overflow: "hidden", background: T.surfC, fontFamily: S.f, color: T.onSurf, transition: `background ${S.dur} ${S.ease}` }}>
      <header style={{ display: "flex", alignItems: "center", height: 64, padding: "0 24px", background: T.surf, borderBottom: `1px solid ${T.outlV}`, flexShrink: 0, gap: 16, transition: `background ${S.dur} ${S.ease}` }}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" fill={T.pri}/><rect x="14" y="3" width="7" height="7" rx="1.5" fill={T.pri} opacity=".6"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill={T.pri} opacity=".4"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill={T.pri} opacity=".2"/></svg>
        <h1 style={{ fontSize: 22, fontWeight: 400, margin: 0, color: T.onSurf }}>ABC Component Library</h1>
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke={T.onSurfV} strokeWidth="1.5"/><path d="M12 2V4M12 20V22M4 12H2M22 12H20M5.64 5.64L7.05 7.05M16.95 16.95L18.36 18.36M5.64 18.36L7.05 16.95M16.95 7.05L18.36 5.64" stroke={T.onSurfV} strokeWidth="1.5" strokeLinecap="round"/></svg>
          <div onClick={() => setDark(!dark)} style={{ width: 48, height: 28, borderRadius: 14, padding: 2, background: dark ? T.pri : T.outlV, cursor: "pointer", transition: `background ${S.dur} ${S.ease}` }}>
            <div style={{ width: 24, height: 24, borderRadius: 12, background: dark ? T.onPri : T.surf, boxShadow: S.el1, transform: dark ? "translateX(20px)" : "translateX(0)", transition: `transform ${S.dur} ${S.ease}` }} />
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke={T.onSurfV} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ width: 1, height: 24, background: T.outlV }} />
        <span style={{ fontSize: 12, color: T.onSurfV, padding: "4px 12px", borderRadius: S.shFull, background: T.surfCH }}>{components.length} component{components.length !== 1 ? "s" : ""}</span>
      </header>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        <aside style={{ width: 260, borderRight: `1px solid ${T.outlV}`, background: T.surf, display: "flex", flexDirection: "column", flexShrink: 0, transition: `background ${S.dur} ${S.ease}` }}>
          <div style={{ padding: 12 }}>
            <div style={{ display: "flex", alignItems: "center", height: 44, borderRadius: S.shFull, background: T.surfCH, padding: "0 16px", gap: 12 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke={T.onSurfV} strokeWidth="1.5"/><path d="M16 16L21 21" stroke={T.onSurfV} strokeWidth="1.5" strokeLinecap="round"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search components" style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontFamily: S.f, fontSize: 14, color: T.onSurf }} />
            </div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "0 8px" }}>
            {filtered.map(c => {
              const isSelected = selComp && selComp.id === c.id;
              return (<button key={c.id} onClick={() => setSelComp(c)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "12px 16px", borderRadius: S.shMd, border: "none", cursor: "pointer", textAlign: "left", fontFamily: S.f, background: isSelected ? T.priC : "transparent", color: isSelected ? T.onPriC : T.onSurf, marginBottom: 2, transition: `background ${S.dur} ${S.ease}` }}>
                <div style={{ width: 32, height: 32, borderRadius: S.shSm, background: isSelected ? T.pri : T.surfCH, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="4" stroke={isSelected ? T.onPri : T.onSurfV} strokeWidth="1.5"/></svg></div>
                <div><div style={{ fontSize: 14, fontWeight: 500 }}>{c.name}</div><div style={{ fontSize: 11, color: isSelected ? T.onPriC : T.onSurfV, marginTop: 1 }}>{Object.keys(c.properties).length} props</div></div>
              </button>);
            })}
          </div>
        </aside>

        {selComp && <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ padding: "14px 24px", borderBottom: `1px solid ${T.outlV}`, background: T.surf, display: "flex", alignItems: "center", justifyContent: "space-between", transition: `background ${S.dur} ${S.ease}` }}>
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 400, margin: 0, color: T.onSurf }}>{selComp.name}</h2>
              <p style={{ fontSize: 12, color: T.onSurfV, margin: "2px 0 0" }}>{selComp.description}</p>
            </div>
            <div style={{ position: "relative" }}>
              <button onClick={() => setExportOpen(!exportOpen)} style={{ display: "flex", alignItems: "center", gap: 8, height: 40, padding: "0 24px", borderRadius: S.shFull, border: `1px solid ${T.outl}`, background: "transparent", color: T.pri, fontFamily: S.f, fontSize: 14, fontWeight: 500, cursor: "pointer" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3V16M12 16L7 11M12 16L17 11" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M3 20H21" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                Export
              </button>
              {exportOpen && (<div style={{ position: "absolute", right: 0, top: 48, background: T.surf, borderRadius: S.shXs, boxShadow: S.el2, border: `1px solid ${T.outlV}`, overflow: "hidden", zIndex: 20, minWidth: 180 }}>
                <button onClick={() => doExport("md")} style={{ display: "block", width: "100%", padding: "12px 20px", border: "none", background: "transparent", textAlign: "left", fontFamily: S.f, fontSize: 14, color: T.onSurf, cursor: "pointer" }} onMouseOver={e => e.currentTarget.style.background = T.surfCH} onMouseOut={e => e.currentTarget.style.background = "transparent"}>Download .md</button>
                <button onClick={() => doExport("json")} style={{ display: "block", width: "100%", padding: "12px 20px", border: "none", background: "transparent", textAlign: "left", fontFamily: S.f, fontSize: 14, color: T.onSurf, cursor: "pointer" }} onMouseOver={e => e.currentTarget.style.background = T.surfCH} onMouseOut={e => e.currentTarget.style.background = "transparent"}>Download .json</button>
              </div>)}
            </div>
          </div>

          <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", overflow: "auto", padding: 32, background: dark ? "#0e0e0e" : "#d3dbe5", transition: `background ${S.dur} ${S.ease}` }}>
            {renderer ? React.createElement(renderer, { ...vars, mediaImg, dominantColor, title, brand, dark }) : <GenericComponentPreview component={selComp} error={rendererError} />}
          </div>

          <div style={{ padding: "8px 24px 10px", borderTop: `1px solid ${T.outlV}`, background: T.surf, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", transition: `background ${S.dur} ${S.ease}` }}>
            {Object.entries(vars).map(([k, v]) => (<span key={k} style={{ fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: S.shFull, background: T.priC, color: T.onPriC }}>{k}: {String(v)}</span>))}
            <span style={{ fontSize: 11, fontWeight: 500, padding: "3px 10px", borderRadius: S.shFull, background: dark ? T.surfCHi : T.surfCH, color: T.onSurfV }}>{dark ? "Dark" : "Light"} mode</span>
          </div>
        </main>}

        {selComp && <aside style={{ width: 300, borderLeft: `1px solid ${T.outlV}`, background: T.surf, display: "flex", flexDirection: "column", flexShrink: 0, overflowY: "auto", transition: `background ${S.dur} ${S.ease}` }}>
          <Section title="Variants" open={sections.variants} onToggle={() => togSec("variants")}>
            {Object.entries(selComp.properties).map(([name, def]) => {
              if (def.type === "BOOLEAN") return <M3Switch key={name} label={name} checked={!!vars[name]} onChange={() => setVar(name, !vars[name])} />;
              if (def.type === "VARIANT" && def.options.length === 2) return <M3Seg key={name} label={name} options={def.options} value={vars[name]||def.default} onChange={v => setVar(name, v)} />;
              return <M3Select key={name} label={name} value={vars[name]||def.default} options={def.options} onChange={v => setVar(name, v)} />;
            })}
          </Section>
          <Section title="Content" open={sections.content} onToggle={() => togSec("content")}>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 500, color: T.onSurfV, marginBottom: 6 }}>Media image</label>
              <input ref={imgRef} type="file" accept="image/*" onChange={handleImg} style={{ display: "none" }} />
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div onClick={() => imgRef.current && imgRef.current.click()} style={{ width: 56, height: 56, borderRadius: S.shSm, background: mediaImg ? "none" : T.surfCH, border: `1px dashed ${T.outl}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden", flexShrink: 0 }}>
                  {mediaImg ? <img src={mediaImg} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke={T.outl} strokeWidth="1.5" strokeLinecap="round"/></svg>}
                </div>
                <div style={{ flex: 1 }}>
                  <button onClick={() => imgRef.current && imgRef.current.click()} style={{ display: "block", fontSize: 13, fontWeight: 500, color: T.pri, background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: S.f }}>{mediaImg ? "Change" : "Upload"}</button>
                  {mediaImg && (<div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                    <div style={{ width: 16, height: 16, borderRadius: 4, background: dominantColor, border: `1px solid ${T.outlV}` }} />
                    <span style={{ fontSize: 11, color: T.onSurfV }}>{dominantColor}</span>
                    <button onClick={() => { setMediaImg(null); setDominantColor("#e0e0e0"); }} style={{ fontSize: 11, color: T.err, background: "none", border: "none", cursor: "pointer", fontFamily: S.f, marginLeft: "auto" }}>Remove</button>
                  </div>)}
                </div>
              </div>
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 500, color: T.onSurfV, marginBottom: 4 }}>Title</label>
              <textarea value={title} onChange={e => setTitle(e.target.value)} placeholder="Card title goes here" rows={2} style={{ width: "100%", padding: "8px 12px", borderRadius: S.shXs, border: `1px solid ${T.outl}`, background: T.surf, color: T.onSurf, fontFamily: S.f, fontSize: 13, lineHeight: "18px", outline: "none", boxSizing: "border-box", resize: "none" }} />
            </div>
            <div>
              <label style={{ display: "block", fontSize: 11, fontWeight: 500, color: T.onSurfV, marginBottom: 4 }}>Brand</label>
              <input value={brand} onChange={e => setBrand(e.target.value)} placeholder="brand.com" style={{ width: "100%", height: 40, padding: "0 12px", borderRadius: S.shXs, border: `1px solid ${T.outl}`, background: T.surf, color: T.onSurf, fontFamily: S.f, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
            </div>
          </Section>
          <Section title="Design Tokens" open={sections.tokens} onToggle={() => togSec("tokens")}>
            {[["Corner radius", selComp.tokens.cornerRadius],["Width", selComp.tokens.width],["Media height", selComp.tokens.mediaHeight],["Padding", selComp.tokens.padding.top+"dp "+selComp.tokens.padding.right+"dp "+selComp.tokens.padding.bottom+"dp "+selComp.tokens.padding.left+"dp"]].map(([l,v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                <span style={{ color: T.onSurfV }}>{l}</span>
                <code style={{ color: T.pri, fontFamily: "monospace", fontSize: 11, background: T.surfCH, padding: "2px 6px", borderRadius: 4 }}>{v}</code>
              </div>
            ))}
          </Section>
          <Section title="Typography" open={sections.typo} onToggle={() => togSec("typo")}>
            {Object.entries(selComp.tokens.typography).map(([k, v]) => (
              <div key={k} style={{ fontSize: 12 }}>
                <span style={{ fontWeight: 500, color: T.onSurf, textTransform: "capitalize" }}>{k}</span>
                <div style={{ color: T.onSurfV, marginTop: 2 }}>{v.token} — {v.spec}</div>
              </div>
            ))}
          </Section>
        </aside>}
      </div>
    </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
